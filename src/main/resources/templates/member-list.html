<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>회원 관리</title>

    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
            rel="stylesheet">
</head>
<body>

<div class="container mt-5">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="fw-bold">회원 관리</h1>
      
        <div th:if="${message != null}" class="alert alert-danger">
          [[${message}]]
        </div>

        <a href="/quiz" class="btn btn-secondary">
            퀴즈 관리로 이동
        </a>
    </div>

    <table class="table table-bordered table-hover align-middle">

        <thead class="table-dark">
        <tr>
            <th>No</th>
            <th>아이디</th>
            <th>권한</th>
            <th>승인 상태</th>
            <th>맞은 수</th>
            <th>틀린 수</th>
            <th>승인</th>
            <th>비밀번호 수정</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="dto : ${dtoList}" th:object="${dto}">

            <td>[[*{no}]]</td>

            <td>[[*{id}]]</td>

            <td>
                <span th:if="*{role.name() == 'ADMIN'}" class="badge bg-danger">
                    [[*{role}]]
                </span>

                <span th:if="*{role.name() == 'USER'}" class="badge bg-primary">
                    [[*{role}]]
                </span>
            </td>

            <td>
                <span th:if="*{status.name() == 'APPROVED'}" class="badge bg-success">
                    승인
                </span>

                <span th:if="*{status.name() == 'PENDING'}" class="badge bg-secondary">
                    미승인
                </span>
            </td>

            <td>[[*{answerTrue}]]</td>

            <td>[[*{answerFalse}]]</td>

            <td>
                <form
                        action="/admin/member/approve"
                        method="post">
                  
                    <input type="hidden" th:value="*{id}" name="id">
                  
                    <button
                            th:if="*{status.name() == 'PENDING'}"
                            type="submit"
                            class="btn btn-success btn-sm">
                        승인
                    </button>

                </form>

                <span th:if="*{status.name() == 'APPROVED'}" class="text-muted">
                    완료
                </span>
            </td>

            <td>
                <form
                        action="/admin/member/password"
                        method="post"
                        class="d-flex gap-2">
                    
                    <input
                            type="password"
                            name="password"
                            class="form-control form-control-sm"
                            placeholder="새 비밀번호">
                  
                    <input type="hidden" th:value="*{id}" name="id">
                    
                    <button
                            type="submit"
                            class="btn btn-warning btn-sm">
                        수정
                    </button>

                </form>
            </td>

        </tr>
        </tbody>

    </table>

</div>

</body>
</html>
