<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>마이페이지</title>

    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
            rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">

    <!-- 상단 메뉴 -->
    <div class="d-flex justify-content-between align-items-center mb-4">

        <h1 class="fw-bold mb-0">
            마이페이지
        </h1>
      
        <div class="d-flex gap-2">

            <!-- 승인 완료 회원만 퀴즈 플레이 가능 -->
            <a th:if="${session.loginMember.status.name() == 'APPROVED'}" href="/quiz/play"
                    class="btn btn-success">
                퀴즈 플레이
            </a>

            <!-- 승인 전 회원 -->
            <button th:if="${session.loginMember.status.name() == 'PENDING'}" class="btn btn-secondary"
                    disabled>
                승인 필요
            </button>

            <!-- 관리자만 퀴즈 관리 이동 -->
            <a th:if="${session.loginMember.role.name() == 'ADMIN'}" href="/quiz"
                    class="btn btn-dark">
                퀴즈 관리
            </a>

            <a
                    href="/member/logout"
                    class="btn btn-outline-danger">
                로그아웃
            </a>

        </div>

    </div>

    <!-- 승인 상태 안내 -->
    <div th:if="${session.loginMember.status.name() == 'APPROVED'}" class="alert alert-success">
        관리자 승인이 완료되었습니다. 퀴즈 플레이가 가능합니다.
    </div>

    <div th:if="${session.loginMember.status.name() == 'PENDING'}" class="alert alert-warning">
        관리자 승인 후 퀴즈 플레이가 가능합니다.
    </div>

    <!-- 메시지 -->
    <div th:if="${message != null}" class="alert alert-info" >
        [[${message}]]
    </div>

    <!-- 사용자 정보 -->
    <div class="card shadow-sm mb-4">

        <div class="card-header fw-bold">
            내 정보
        </div>

        <div class="card-body">

            <table class="table align-middle mb-0" th:object="${session.loginMember}">

                <tbody>

                <tr>
                    <th style="width: 200px;">아이디</th>
                    <td>
                        [[*{id}]]
                    </td>
                </tr>

                <tr>
                    <th>권한</th>
                    <td>
                        <span th:if="*{role.name() == 'ADMIN'}" class="badge bg-danger">
                            ADMIN
                        </span>

                        <span th:if="*{role.name() == 'USER'}" class="badge bg-primary">
                            USER
                        </span>
                    </td>
                </tr>

                <tr>
                    <th>승인 상태</th>
                    <td>
                        <span th:if="*{status.name() == 'APPROVED'}" class="badge bg-success">
                            승인 완료
                        </span>

                        <span th:if="*{status.name() == 'PENDING'}" class="badge bg-secondary">
                            승인 대기
                        </span>
                    </td>
                </tr>

                <tr>
                    <th>맞은 문제 수</th>
                    <td>
                        <span
                                class="badge bg-primary">
                            [[*{answerTrue}]]
                        </span>
                    </td>
                </tr>

                <tr>
                    <th>틀린 문제 수</th>
                    <td>
                        <span
                                class="badge bg-danger">
                            [[*{answerFalse}]]
                        </span>
                    </td>
                </tr>

                <tr>
                    <th>가입일</th>
                    <td th:text="*{#temporals.format(createdAt, 'yy-MM-dd HH:mm:ss')}">
                    </td>
                </tr>

                </tbody>

            </table>

        </div>

    </div>

    <!-- 비밀번호 수정 -->
    <div class="card shadow-sm">

        <div class="card-header fw-bold">
            비밀번호 수정
        </div>

        <div class="card-body">

            <form
                    action="/member/password"
                    method="post"
                    onsubmit="return checkPassword();">

                <div class="mb-3">
                    <label class="form-label">
                        새 비밀번호
                    </label>

                    <input
                            type="password"
                            id="password"
                            name="password"
                            class="form-control"
                            required>
                </div>

                <div class="mb-3">
                    <label class="form-label">
                        새 비밀번호 확인
                    </label>

                    <input
                            type="password"
                            id="passwordCheck"
                            class="form-control"
                            required>
                </div>

                <div
                        id="passwordMessage"
                        class="text-danger fw-bold mb-3">
                </div>

                <button
                        type="submit"
                        class="btn btn-warning">
                    비밀번호 수정
                </button>

            </form>

        </div>

    </div>

</div>

<script>
    function checkPassword() {

        const password =
            document.getElementById("password").value;

        const passwordCheck =
            document.getElementById("passwordCheck").value;

        const message =
            document.getElementById("passwordMessage");

        if (password !== passwordCheck) {

            message.textContent =
                "비밀번호가 일치하지 않습니다.";

            return false;
        }

        return true;
    }
</script>

</body>
</html>
